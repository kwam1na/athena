name: Athena PR Tests

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      runtime_behavior_report_lines:
        description: Optional literal [harness:behavior:report] lines to aggregate into runtime trend history.
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  harness-validation:
    name: Harness and Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check GitHub workflow YAML
        run: bun run workflow:check

      - name: Check delivery documentation
        run: bun run delivery:documentation-check

      - name: Install Graphify runtime
        run: python3 -m pip install -r .graphify-requirements.txt

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: Run harness self-review
        run: bun run harness:self-review --base origin/main

      - name: Run harness review
        run: bun run harness:review --base origin/main --validation-provided-by athena-pr-tests

      - name: Check harness docs
        run: bun run harness:check

      - name: Check architecture boundaries
        run: bun run architecture:check

      - name: Audit harness coverage
        run: bun run harness:audit

      - name: Inferential harness review
        env:
          HARNESS_INFERENTIAL_SEMANTIC_MODE: shadow
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run harness:inferential-review

      - name: Generate harness scorecard
        run: bun run harness:scorecard

      - name: Check graphify freshness
        run: bun run graphify:check

      - name: Upload harness validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-validation-artifacts
          path: |
            artifacts/harness-inferential-review
            artifacts/harness-scorecard/latest.json
          if-no-files-found: ignore

  harness-janitor-report:
    name: Harness Janitor Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Graphify runtime
        run: python3 -m pip install -r .graphify-requirements.txt

      - name: Run harness janitor (report mode)
        run: bun run harness:janitor

      - name: Persist inferential history (shadow mode)
        env:
          HARNESS_INFERENTIAL_SEMANTIC_MODE: shadow
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run harness:inferential-review --persist-history

      - name: Persist runtime trend history when harness behavior logs are available
        shell: bash
        run: |
          set -euo pipefail
          INPUT_FILE="$(mktemp)"
          python3 - <<'PY' > "$INPUT_FILE"
          import json
          import os
          import sys

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as handle:
              event = json.load(handle)

          sys.stdout.write(event.get("inputs", {}).get("runtime_behavior_report_lines", ""))
          PY

          if [ -s "$INPUT_FILE" ]; then
            cat "$INPUT_FILE" | bun run harness:runtime-trends --persist-history
            exit 0
          fi

          mapfile -t behavior_logs < <(find artifacts/harness-behavior -type f \( -name '*.log' -o -name '*.txt' \) 2>/dev/null | sort)
          if [ "${#behavior_logs[@]}" -eq 0 ]; then
            echo "No harness behavior logs found; skipping runtime trend history persistence."
            exit 0
          fi

          cat "${behavior_logs[@]}" | bun run harness:runtime-trends --persist-history

      - name: Generate harness telemetry scorecard
        run: bun run harness:scorecard

      - name: Upload harness telemetry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-telemetry-artifacts
          path: |
            artifacts/harness-inferential-review
            artifacts/harness-behavior/trends
            artifacts/harness-scorecard/latest.json
          if-no-files-found: ignore

  harness-implementation-tests:
    name: Harness Implementation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run harness implementation tests
        run: bun run harness:test

  athena-webapp-validation:
    name: Athena and Storefront Webapp Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit Athena Convex baseline
        run: bun run --filter '@athena/webapp' audit:convex

      - name: Lint changed Athena Convex files
        run: bun run --filter '@athena/webapp' lint:convex:changed

      - name: Lint changed Athena frontend files
        run: bun run --filter '@athena/webapp' lint:frontend:changed

      - name: Build Athena webapp
        run: bun run --filter '@athena/webapp' build

      - name: Build storefront webapp
        run: bun run --filter '@athena/storefront-webapp' build

      - name: Run repo coverage policy
        run: bun run test:coverage

  athena-prod-pos-e2e:
    name: Athena POS E2E against Production Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: athena-prod-pos-e2e-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install chromium

      - name: Report candidate production-backend coverage mode
        shell: bash
        run: |
          set -euo pipefail
          echo "Candidate UI will exercise read-only production-backend compatibility and the unregistered-terminal setup gate."
          echo "Authenticated service-principal recovery remains covered by branch integration tests until the matching backend is deployed."
          echo "This PR check does not provision or mutate production terminal state."

      - name: Run candidate POS E2E against production backend
        env:
          ATHENA_POS_E2E_RUN_LOCAL_BUILD: "1"
          ATHENA_PROD_CONVEX_URL: https://colorless-cardinal-870.convex.cloud
          ATHENA_PROD_CONVEX_SITE_URL: https://colorless-cardinal-870.convex.site
          ATHENA_PROD_POS_STORE_ID: nn7byz68a3j4tfjvgdf9evpt3n78kk38
          ATHENA_PROD_POS_HUB_PATH: /wigclub/store/wigclub/pos
        run: bun run --filter '@athena/webapp' -- test:e2e:prod:pos

      - name: Upload production POS E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: athena-prod-pos-e2e-artifacts
          path: |
            packages/athena-webapp/playwright-report
            /tmp/athena-webapp-prod-playwright-results
          if-no-files-found: ignore

  storefront-webapp-validation-context:
    name: Storefront Webapp Validation Context
    needs: athena-webapp-validation
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Confirm consolidated storefront validation coverage
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.athena-webapp-validation.result }}" != "success" ]; then
            echo "Consolidated webapp validation did not pass; storefront context cannot pass."
            exit 1
          fi

          echo "Storefront tests and build are covered by Athena and Storefront Webapp Validation."
