name: Athena QA Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: athena-qa-deploy
  cancel-in-progress: false

jobs:
  deploy-qa:
    name: Deploy Athena QA
    if: github.repository == 'kwam1na/athena'
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deploy scripts
        run: bash -n scripts/deploy-vps.sh scripts/deploy-qa-vps.sh

      - name: Configure SSH
        env:
          ATHENA_QA_HOST: ${{ secrets.ATHENA_QA_HOST }}
          ATHENA_QA_USER: ${{ secrets.ATHENA_QA_USER }}
          ATHENA_QA_SSH_PRIVATE_KEY: ${{ secrets.ATHENA_QA_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${ATHENA_QA_HOST:-}" ]; then
            echo "Missing ATHENA_QA_HOST secret." >&2
            exit 1
          fi

          if [ -z "${ATHENA_QA_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing ATHENA_QA_SSH_PRIVATE_KEY secret." >&2
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$ATHENA_QA_SSH_PRIVATE_KEY" > "$HOME/.ssh/athena_qa_deploy"
          chmod 600 "$HOME/.ssh/athena_qa_deploy"

          ssh-keyscan -H "$ATHENA_QA_HOST" >> "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<SSH_CONFIG
          Host athena-qa-vps
            HostName $ATHENA_QA_HOST
            User ${ATHENA_QA_USER:-root}
            IdentityFile $HOME/.ssh/athena_qa_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            BatchMode yes
          SSH_CONFIG

          chmod 600 "$HOME/.ssh/config"

      - name: Check VPS access
        run: ssh athena-qa-vps 'true'

      - name: Deploy QA
        env:
          DEPLOY_REF: ${{ github.sha }}
          REMOTE: athena-qa-vps
        run: scripts/deploy-vps.sh qa

      - name: Smoke check QA nginx route
        run: |
          set -euo pipefail
          ssh athena-qa-vps 'for attempt in $(seq 1 12); do
            if curl -fsS -I -H "Host: athena-qa.wigclub.store" http://127.0.0.1/ >/tmp/athena-qa-smoke.headers; then
              head -n 1 /tmp/athena-qa-smoke.headers
              exit 0
            fi
            sleep 5
          done
          exit 1'
